<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Guest Login — AKSHIM The Royal Union</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Cormorant+Garamond:ital,wght@0,300;1,300;1,400&family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: #050010;
            color: #fdf2cf;
            font-family: 'Outfit', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        canvas#bg { position: fixed; inset: 0; z-index: 0; pointer-events: none; }

        /* Royal frame corners */
        .frame {
            position: fixed;
            inset: 14px;
            z-index: 2;
            pointer-events: none;
            border: 1px solid rgba(212,175,55,0.25);
        }

        /* ── CARD ── */
        .card {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 420px;
            margin: 20px;
            background: rgba(10, 1, 26, 0.85);
            border: 1px solid rgba(212,175,55,0.25);
            border-radius: 16px;
            padding: 44px 36px 36px;
            backdrop-filter: blur(24px);
            box-shadow: 0 0 80px rgba(0,0,0,0.8), 0 0 40px rgba(212,175,55,0.04);
            animation: card-in 0.8s cubic-bezier(0.34,1.56,0.64,1) both;
        }
        @keyframes card-in {
            from { opacity: 0; transform: translateY(30px) scale(0.96); }
            to   { opacity: 1; transform: translateY(0) scale(1); }
        }

        /* gold top line */
        .card::before {
            content: '';
            position: absolute;
            top: 0; left: 10%; right: 10%;
            height: 1px;
            background: linear-gradient(to right, transparent, #D4AF37, transparent);
            opacity: 0.6;
        }

        /* ── LOGO ── */
        .logo-wrap {
            text-align: center;
            margin-bottom: 24px;
        }
        .logo-wrap img {
            width: 72px;
            height: 72px;
            object-fit: contain;
            opacity: 0.85;
            filter: drop-shadow(0 0 20px rgba(212,175,55,0.2));
        }

        /* ── HEADINGS ── */
        .card-title {
            font-family: 'Cinzel', serif;
            font-size: 1.3rem;
            font-weight: 700;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            text-align: center;
            background: linear-gradient(135deg, #fdf2cf, #D4AF37, #fdf2cf);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 6px;
        }
        .card-sub {
            font-family: 'Cormorant Garamond', serif;
            font-style: italic;
            font-size: 0.95rem;
            color: rgba(212,175,55,0.55);
            text-align: center;
            margin-bottom: 32px;
        }

        /* ── FORM ── */
        .field { margin-bottom: 24px; }
        .field label {
            display: block;
            font-size: 9px;
            font-weight: 700;
            letter-spacing: 0.35em;
            text-transform: uppercase;
            color: rgba(212,175,55,0.6);
            margin-bottom: 10px;
        }
        .input-wrap {
            display: flex;
            align-items: center;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(212,175,55,0.18);
            border-radius: 8px;
            padding: 0 16px;
            transition: border-color 0.3s, box-shadow 0.3s;
        }
        .input-wrap:focus-within {
            border-color: rgba(212,175,55,0.6);
            box-shadow: 0 0 20px rgba(212,175,55,0.08);
        }
        .input-wrap i { color: rgba(212,175,55,0.3); font-size: 13px; margin-right: 12px; }
        .input-wrap input {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            padding: 16px 0;
            font-family: 'Outfit', sans-serif;
            font-size: 14px;
            color: #fdf2cf;
        }
        .input-wrap input::placeholder { color: rgba(212,175,55,0.2); }

        /* ── OTP BOX ── */
        #step-otp { display: none; }
        #otp-input {
            width: 100%;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(212,175,55,0.2);
            border-radius: 8px;
            padding: 18px;
            text-align: center;
            font-family: 'Cinzel', serif;
            font-size: 1.6rem;
            letter-spacing: 0.6em;
            color: #D4AF37;
            outline: none;
            transition: border-color 0.3s;
        }
        #otp-input:focus { border-color: rgba(212,175,55,0.6); }
        .otp-hint {
            font-size: 9px;
            text-align: center;
            color: rgba(212,175,55,0.35);
            letter-spacing: 0.15em;
            text-transform: uppercase;
            margin-top: 8px;
        }

        /* ── BUTTONS ── */
        .btn-primary {
            width: 100%;
            padding: 18px;
            font-family: 'Outfit', sans-serif;
            font-size: 10px;
            font-weight: 900;
            letter-spacing: 0.4em;
            text-transform: uppercase;
            background: linear-gradient(135deg, #D4AF37, #f0d060, #D4AF37);
            color: #050010;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            box-shadow: 0 0 24px rgba(212,175,55,0.3);
            transition: filter 0.2s, transform 0.15s;
            margin-top: 8px;
        }
        .btn-primary:hover { filter: brightness(1.08); }
        .btn-primary:active { transform: scale(0.98); }
        .btn-primary:disabled { opacity: 0.55; cursor: not-allowed; }

        /* ── ERROR ── */
        .error-box {
            display: none;
            background: rgba(220,38,38,0.08);
            border: 1px solid rgba(220,38,38,0.25);
            border-radius: 6px;
            padding: 10px 14px;
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: #f87171;
            text-align: center;
            margin-bottom: 16px;
        }

        /* ── DIVIDER ── */
        .divider {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 20px 0;
        }
        .divider-line { flex: 1; height: 1px; background: rgba(212,175,55,0.08); }
        .divider-text { font-size: 8px; color: rgba(212,175,55,0.25); font-weight: 700; letter-spacing: 0.2em; text-transform: uppercase; }

        /* ── SKIP LINK ── */
        .skip-link {
            display: block;
            text-align: center;
            margin-top: 20px;
            font-size: 9px;
            font-weight: 700;
            letter-spacing: 0.25em;
            text-transform: uppercase;
            color: rgba(212,175,55,0.4);
            text-decoration: none;
            transition: color 0.3s;
            cursor: pointer;
        }
        .skip-link:hover { color: rgba(212,175,55,0.8); }

        /* ── BACK LINK ── */
        .back-link {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            margin-top: 28px;
            font-size: 9px;
            font-weight: 700;
            letter-spacing: 0.25em;
            text-transform: uppercase;
            color: rgba(212,175,55,0.3);
            text-decoration: none;
            transition: color 0.3s;
        }
        .back-link:hover { color: rgba(212,175,55,0.7); }

        /* ── FOOTER ── */
        .card-footer {
            font-family: 'Cinzel', serif;
            font-size: 8px;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            color: rgba(212,175,55,0.15);
            text-align: center;
            margin-top: 28px;
        }

        /* autofill fix */
        input:-webkit-autofill,
        input:-webkit-autofill:hover,
        input:-webkit-autofill:focus {
            -webkit-box-shadow: 0 0 0 40px #0a011a inset !important;
            -webkit-text-fill-color: #fdf2cf !important;
        }
    </style>
</head>
<body>

    <canvas id="bg"></canvas>
    <div class="frame"></div>

    <div class="card">

        <!-- Logo -->
        <div class="logo-wrap">
            <img src="images/akshim_logo.png" alt="AKSHIM Logo">
        </div>

        <h1 class="card-title">Guest Access</h1>
        <p class="card-sub">Enter your details to join the celebration</p>

        <!-- Step 1: Name + Phone -->
        <div id="step-details">
            <div class="field">
                <label>Full Name</label>
                <div class="input-wrap">
                    <i class="fa-solid fa-user"></i>
                    <input type="text" id="g-name" placeholder="Your Name" autocomplete="name">
                </div>
            </div>
            <div class="field">
                <label>Mobile Number</label>
                <div class="input-wrap">
                    <i class="fa-solid fa-mobile-screen"></i>
                    <input type="tel" id="g-phone" placeholder="e.g. 9876543210" autocomplete="tel" inputmode="numeric">
                </div>
            </div>
            <div class="error-box" id="err1"></div>
            <button class="btn-primary" onclick="requestOTP()" id="btn-otp">
                ✦ &nbsp;GET ACCESS CODE&nbsp; ✦
            </button>
        </div>

        <!-- Step 2: OTP -->
        <div id="step-otp">
            <div class="field">
                <label>Access Code (OTP)</label>
                <input type="text" id="otp-input" maxlength="6" placeholder="• • • •" inputmode="numeric">
                <p class="otp-hint">Sent to your WhatsApp number</p>
            </div>
            <div class="error-box" id="err2"></div>
            <button class="btn-primary" onclick="verifyOTP()" id="btn-verify">
                ✦ &nbsp;VERIFY &amp; ENTER&nbsp; ✦
            </button>
            <p class="skip-link" onclick="backToDetails()">← Change Number</p>
        </div>

        <div class="divider">
            <div class="divider-line"></div>
            <span class="divider-text">or</span>
            <div class="divider-line"></div>
        </div>

        <p class="skip-link" onclick="skipToGallery()">
            Skip &amp; Browse Gallery <i class="fa-solid fa-arrow-right" style="font-size:9px;"></i>
        </p>

        <a href="index.html" class="back-link">
            <svg width="12" height="12" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M15 19l-7-7 7-7"/>
            </svg>
            Back to Invitation
        </a>

        <p class="card-footer">Akshay &amp; Himanshi — July 7, 2026</p>
    </div>

    <script>
        // ── STARFIELD ──
        (() => {
            const cv = document.getElementById('bg');
            const cx = cv.getContext('2d');
            let W, H;
            const resize = () => { W = cv.width = innerWidth; H = cv.height = innerHeight; };
            resize(); window.addEventListener('resize', resize);
            const stars = Array.from({length:80}, () => ({
                x: Math.random(), y: Math.random(),
                r: Math.random()*0.7+0.1, a: Math.random()*0.4+0.1,
                da: Math.random()*0.004+0.002, dir: 1
            }));
            (function animate() {
                cx.clearRect(0,0,W,H);
                const g = cx.createRadialGradient(W/2,H*0.4,0,W/2,H/2,Math.max(W,H)*0.7);
                g.addColorStop(0,'rgba(40,0,90,0.15)'); g.addColorStop(1,'rgba(5,0,16,0)');
                cx.fillStyle=g; cx.fillRect(0,0,W,H);
                stars.forEach(s => {
                    s.a += s.da*s.dir;
                    if(s.a>0.7||s.a<0.05) s.dir*=-1;
                    cx.beginPath(); cx.arc(s.x*W,s.y*H,s.r,0,Math.PI*2);
                    cx.fillStyle=`rgba(253,242,207,${s.a})`; cx.fill();
                });
                requestAnimationFrame(animate);
            })();
        })();

        // ── AUTH FLOW ──
        function setErr(id, msg) {
            const el = document.getElementById(id);
            if (msg) { el.textContent = msg; el.style.display = 'block'; }
            else el.style.display = 'none';
        }

        async function requestOTP() {
            const name = document.getElementById('g-name').value.trim();
            const phone = document.getElementById('g-phone').value.trim();
            const btn = document.getElementById('btn-otp');
            setErr('err1', '');

            if (!name) return setErr('err1', 'Please enter your name');
            if (!phone || phone.length < 10) return setErr('err1', 'Please enter a valid mobile number');

            btn.disabled = true;
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> &nbsp;Sending Code...';

            try {
                const res = await fetch('/api/guest/request-otp', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, phone })
                });
                const data = await res.json();
                if (data.success) {
                    document.getElementById('step-details').style.display = 'none';
                    document.getElementById('step-otp').style.display = 'block';
                    setTimeout(() => document.getElementById('otp-input').focus(), 100);
                } else {
                    setErr('err1', data.error || 'Failed to send code. Try again.');
                }
            } catch (e) {
                setErr('err1', 'Connection error. Please try again.');
            } finally {
                btn.disabled = false;
                btn.innerHTML = '✦ &nbsp;GET ACCESS CODE&nbsp; ✦';
            }
        }

        async function verifyOTP() {
            const phone = document.getElementById('g-phone').value.trim();
            const otp = document.getElementById('otp-input').value.trim();
            const btn = document.getElementById('btn-verify');
            setErr('err2', '');

            if (!otp) return setErr('err2', 'Please enter the access code');

            btn.disabled = true;
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> &nbsp;Verifying...';

            try {
                const res = await fetch('/api/guest/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ phone, otp })
                });
                const data = await res.json();
                if (data.success) {
                    sessionStorage.setItem('akshim_guest', JSON.stringify(data.guest));
                    btn.innerHTML = '✓ &nbsp;Welcome!';
                    setTimeout(() => { window.location.href = 'gallery.html'; }, 600);
                } else {
                    setErr('err2', data.error || 'Invalid code. Try again.');
                    btn.disabled = false;
                    btn.innerHTML = '✦ &nbsp;VERIFY &amp; ENTER&nbsp; ✦';
                }
            } catch (e) {
                setErr('err2', 'Connection error. Please try again.');
                btn.disabled = false;
                btn.innerHTML = '✦ &nbsp;VERIFY &amp; ENTER&nbsp; ✦';
            }
        }

        function backToDetails() {
            document.getElementById('step-otp').style.display = 'none';
            document.getElementById('step-details').style.display = 'block';
            setErr('err2', '');
        }

        function skipToGallery() {
            window.location.href = 'gallery.html';
        }

        // Enter key support
        document.addEventListener('keydown', e => {
            if (e.key !== 'Enter') return;
            if (document.getElementById('step-otp').style.display === 'block') verifyOTP();
            else requestOTP();
        });
    </script>
</body>
</html>
